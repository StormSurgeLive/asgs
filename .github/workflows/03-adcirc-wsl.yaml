name: Build ASGS and ADCIRCs in WSL2 and Export Distro

on:
  push:
    branches:
      - master
      - issue-1677
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-wsl2-export:
    runs-on: windows-2022

    env:
      WSL_USER: asgs
      EXPORT_BASENAME: asgs-wsl2-ubuntu
      WSL_BUILD_SCRIPT: /tmp/build-asgs-and-adcircs.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure WSL is available and set WSL2 default
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl --status
          wsl --set-default-version 2

      - name: Select existing Ubuntu WSL distro
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $distros = (wsl --list --quiet) | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          if (-not $distros) {
            throw "No WSL distributions are available on this runner."
          }

          $preferred = @("Ubuntu", "Ubuntu-22.04", "Ubuntu-24.04")
          $selected = $null

          foreach ($name in $preferred) {
            if ($distros -contains $name) {
              $selected = $name
              break
            }
          }

          if (-not $selected) {
            $selected = $distros[0]
          }

          "DISTRO_NAME=$selected" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using WSL distro: $selected"
          wsl --list --verbose

      - name: Initialize distro and create build user
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          wsl -d $env:DISTRO_NAME -u root -- bash -lc "echo WSL distro is reachable"

          wsl -d $env:DISTRO_NAME -u root -- bash -lc @"
          set -euxo pipefail
          id -u $env:WSL_USER >/dev/null 2>&1 || useradd -m -s /bin/bash $env:WSL_USER
          mkdir -p /home/$env:WSL_USER
          chown -R $env:WSL_USER:$env:WSL_USER /home/$env:WSL_USER
          "@

      - name: Copy repository into WSL home
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $repo = (Get-Location).Path
          $drive = $repo.Substring(0,1).ToLower()
          $rest  = $repo.Substring(3).Replace('\','/')
          $wslRepo = "/mnt/$drive/$rest"

          wsl -d $env:DISTRO_NAME -u root -- bash -lc @"
          set -euxo pipefail
          rm -rf /home/$env:WSL_USER/asgs
          mkdir -p /home/$env:WSL_USER
          cp -a "$wslRepo" /home/$env:WSL_USER/asgs
          chown -R $env:WSL_USER:$env:WSL_USER /home/$env:WSL_USER/asgs
          "@

      - name: Write WSL build script
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $script = @'
          #!/usr/bin/env bash
          set -euxo pipefail

          export DEBIAN_FRONTEND=noninteractive
          export TERM=xterm
          export CI=true

          apt-get update
          apt-get install -y \
            bash \
            bc \
            build-essential \
            bzip2 \
            ca-certificates \
            checkinstall \
            curl \
            file \
            findutils \
            flex \
            gawk \
            git \
            gfortran \
            gzip \
            htop \
            libexpat1-dev \
            libssl-dev \
            make \
            patch \
            procps \
            python3 \
            rsync \
            screen \
            sed \
            tar \
            tmux \
            unzip \
            vim \
            wget \
            zip \
            zlib1g-dev

          cd /home/'"$env:WSL_USER"'/asgs

          rm -rf ./opt ./tmp ./profiles
          rm -f ./update-asgs

          chmod +x ./init-asgs.sh
          ./init-asgs.sh -b -A -c gfortran

          test -x ./update-asgs
          test -d ./opt
          test -d ./profiles
          test -x ./asgsh

          if [ -x ./cloud/general/t/build-all-adcircs.sh ]; then
            BUILD_ALL_SCRIPT=./cloud/general/t/build-all-adcircs.sh
          elif [ -f ./cloud/general/t/build-all-adcircs.sh ]; then
            chmod +x ./cloud/general/t/build-all-adcircs.sh
            BUILD_ALL_SCRIPT=./cloud/general/t/build-all-adcircs.sh
          elif [ -x ./t/build-all-adcircs.sh ]; then
            BUILD_ALL_SCRIPT=./t/build-all-adcircs.sh
          elif [ -f ./t/build-all-adcircs.sh ]; then
            chmod +x ./t/build-all-adcircs.sh
            BUILD_ALL_SCRIPT=./t/build-all-adcircs.sh
          else
            echo "Could not find build-all-adcircs.sh"
            exit 1
          fi

          ./asgsh -A "
            set -euxo pipefail
            bash \"$BUILD_ALL_SCRIPT\"
          "

          ./asgsh -A "
            set -euxo pipefail
            list adcirc
            verify adcirc
          "

          mapfile -t bins < <(find /home/'"$env:WSL_USER"'/asgs -type f \
            \( -name adcirc -o -name padcirc -o -name adcswan -o -name padcswan \) \
            | sort)

          printf 'Discovered binaries:\n'
          if [ "${#bins[@]}" -eq 0 ]; then
            echo "  <none>"
            exit 1
          fi
          printf '  %s\n' "${bins[@]}"

          apt-get clean
          rm -rf /var/lib/apt/lists/*
          rm -rf /tmp/*
          '@

          $tmp = Join-Path $env:RUNNER_TEMP "build-asgs-and-adcircs.sh"
          Set-Content -Path $tmp -Value $script -NoNewline

          $content = Get-Content -Raw $tmp
          wsl -d $env:DISTRO_NAME -u root -- bash -lc @"
          cat > $env:WSL_BUILD_SCRIPT <<'EOF'
          $content
          EOF
          chmod +x $env:WSL_BUILD_SCRIPT
          "@

      - name: Run build inside WSL2
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl -d $env:DISTRO_NAME -u root -- bash -lc "$env:WSL_BUILD_SCRIPT"

      - name: Set default user inside exported distro
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          wsl -d $env:DISTRO_NAME -u root -- bash -lc @"
          cat >/etc/wsl.conf <<EOF
          [user]
          default=$env:WSL_USER
          EOF
          "@

      - name: Shut down WSL before export
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl --shutdown

      - name: Export WSL distro as tar
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $exportDir = Join-Path $env:RUNNER_TEMP "wsl-export"
          New-Item -ItemType Directory -Force -Path $exportDir | Out-Null

          $tarPath = Join-Path $exportDir "$env:EXPORT_BASENAME.tar"
          wsl --export $env:DISTRO_NAME $tarPath

          Write-Host "Exported distro to $tarPath"

      - name: Upload exported WSL distro
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_BASENAME }}
          path: ${{ runner.temp }}\wsl-export\${{ env.EXPORT_BASENAME }}.tar
          if-no-files-found: error
