name: ASGS One-Shot Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gfortran \
            wget curl git bc \
            flex gawk procps \
            zlib1g-dev \
            libssl-dev libexpat1-dev

      - name: Run ASGS + ADCIRC build (single shell)
        run: |
          set -euxo pipefail
          export TERM=xterm

          echo "=== STEP 1: init-asgs ==="
          ./init-asgs.sh -A -b

          echo "=== STEP 2: run ADCIRC builds ==="
          ./asgsh -A "bash ./cloud/general/t/build-all-adcirc.sh"

          echo "=== DONE ==="
        timeout-minutes: 120
