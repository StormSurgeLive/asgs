name: Run Selected Install Scripts

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  run-scripts:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ubuntu packages
        run: |
          set -euxo pipefail

          sudo apt-get -y update
          sudo apt-get install -y \
            build-essential \
            checkinstall \
            libssl-dev \
            libexpat1-dev \
            gfortran \
            wget \
            curl \
            vim \
            screen \
            htop \
            tmux \
            git \
            bc \
            zip \
            flex \
            gawk \
            procps \
            zlib1g-dev

          # Install the older GCCs we want, set them to system defaults
          sudo apt-get install -y gcc-9 g++-9 gfortran-9
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 9
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 9
          sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-9 9

      - name: Restore cached ASGS opt tree
        id: cache-opt
        uses: actions/cache@v4
        with:
          path: ./opt
          key: ${{ runner.os }}-asgs-opt-${{ hashFiles('cloud/general/asgs-brew.pl','cloud/general/init-gnu-units.sh','cloud/general/init-hdf5.sh','cloud/general/init-input-nodalattr.sh','cloud/general/init-jq.sh','cloud/general/init-nco.sh','cloud/general/init-netcdf4.sh','cloud/general/init-openmpi.sh','cloud/general/init-perlbrew.sh','cloud/general/init-perl-modules.sh','cloud/general/init-pigz.sh','cloud/general/init-util-output.sh','cloud/general/init-util.sh') }}

      - name: Prepare shell environment
        run: |
          set -euxo pipefail
          export TERM=xterm
          chmod +x ./ci/01-install-shell-only.sh
          ./ci/01-install-shell-only.sh

      - name: Check cached opt marker
        id: opt-marker
        run: |
          set -euxo pipefail

          if [ -f ./opt/.cache-markers/asgs-brew-complete ]; then
            echo "cache_valid=true" >> "$GITHUB_OUTPUT"
            echo "Found cache marker:"
            cat ./opt/.cache-markers/asgs-brew-complete
          else
            echo "cache_valid=false" >> "$GITHUB_OUTPUT"
            echo "No cache marker found"
          fi

      - name: Rebuild ASGS dependency stack
        if: steps.opt-marker.outputs.cache_valid != 'true'
        run: |
          set -euxo pipefail
          export TERM=xterm

          rm -rf ./opt
          mkdir -p ./opt

          chmod +x ./ci/02-install-openmpi.sh
          ./ci/02-install-openmpi.sh

          chmod +x ./ci/03-install-hdf5.sh
          ./ci/03-install-hdf5.sh

          chmod +x ./ci/04-install-netcdf4.sh
          ./ci/04-install-netcdf4.sh

          steps=(
            setup-env
            wgrib2
            cpra-postproc
            output
            util
            util-output
            input-mesh
            input-nodalattr
            perl
            perl-modules
            gnuplot
            units
            nco
            pigz
            jq
            asgs-lint
          )

          for step in "${steps[@]}"; do
            echo "=============================="
            echo "Running ASGS step: $step"
            echo "=============================="
            ./init-asgs.sh -b -x "--run-steps $step"
          done

          mkdir -p ./opt/.cache-markers
          {
            echo "status=success"
            echo "created_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner_os=${RUNNER_OS}"
            echo "hash=${{ hashFiles('cloud/general/asgs-brew.pl','cloud/general/init-gnu-units.sh','cloud/general/init-hdf5.sh','cloud/general/init-input-nodalattr.sh','cloud/general/init-jq.sh','cloud/general/init-nco.sh','cloud/general/init-netcdf4.sh','cloud/general/init-openmpi.sh','cloud/general/init-perlbrew.sh','cloud/general/init-perl-modules.sh','cloud/general/init-pigz.sh','cloud/general/init-util-output.sh','cloud/general/init-util.sh') }}"
          } > ./opt/.cache-markers/asgs-brew-complete
        timeout-minutes: 120

      - name: Show cached opt marker
        run: |
          set -euxo pipefail
          test -f ./opt/.cache-markers/asgs-brew-complete
          cat ./opt/.cache-markers/asgs-brew-complete

      - name: Debug ASGS environment
        run: |
          set -euxo pipefail
          export TERM=xterm

          echo "PWD=$PWD"
          echo "PATH=$PATH"
          ls -l ./asgsh || true
          ls -l ./cloud/general/t/build-all-adcirc.sh || true
          command -v perl || true
          command -v init-adcirc.sh || true

          ./asgsh -A "echo INSIDE_ASGSH; pwd; echo PATH=\$PATH; command -v init-adcirc.sh || true; command -v perl || true; verify perl || true; env | sort"
        timeout-minutes: 120

      - name: Build All Supported ADCIRCs
        run: |
          set -euxo pipefail
          export TERM=xterm
          ./asgsh -A "bash ./cloud/general/t/build-all-adcirc.sh"
        timeout-minutes: 120
