name: Run Selected Install Scripts

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  run-scripts:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Ubuntu packages
        run: |
          sudo apt-get -y update
          sudo apt-get install -y build-essential checkinstall
          sudo apt-get install -y libssl-dev libexpat1-dev
          sudo apt-get install -y gfortran wget curl vim screen htop tmux git bc
          sudo apt-get install -y zip flex gawk procps
          sudo apt-get install -y zlib1g-dev

      - name: Set TERM and run install script with --update-shell
        run: |
          export TERM=xterm
          ./init-asgs.sh -b -x "--update-shell"

      - name: Cache OpenMPI build directory
        id: cache-openmpi
        uses: actions/cache@v4
        with:
          path: ./tmp/openmpi-builddir
          key: ${{ runner.os }}-openmpi-builddir-${{ hashFiles('cloud/general/init-openmpi.sh', 'cloud/general/asgs-brew.pl') }}

      - name: Build or install OpenMPI
        run: |
          set -e
          export TERM=xterm

          if [ -d ./tmp/openmpi-builddir ]; then
            echo "Using cached OpenMPI build directory"
            cd ./tmp/openmpi-builddir
            make install
          else
            echo "No cached OpenMPI build directory found; building OpenMPI"
            cd "$GITHUB_WORKSPACE"
            export ASGS_PRESERVE_OPENMPI_BUILD=1
            ./init-asgs.sh -b -x "--run-steps openmpi"
          fi
        timeout-minutes: 120

      - name: Run remaining ASGS build steps
        run: |
          set -e
          export TERM=xterm

          steps=(
            setup-env
            hdf5
            netcdf4
            wgrib2
            cpra-postproc
            output
            util
            util-output
            input-mesh
            input-nodalattr
            perl
            perl-modules
            gnuplot
            units
            nco
            pigz
            jq
            asgs-lint
          )

          for step in "${steps[@]}"; do
            echo "=============================="
            echo "Running ASGS step: $step"
            echo "=============================="
            ./init-asgs.sh -b -x "--run-steps $step"
          done
        timeout-minutes: 120

      - name: Debug Build All Supported ADCIRCs
        run: |
          set -euxo pipefail
          export TERM=xterm
          env 
          pwd
          ls -l ./asgsh
          ls -l ./cloud/general/t/build-all-adcirc.sh
      
          head -50 ./cloud/general/t/build-all-adcirc.sh || true
      
          ./asgsh -A "pwd; env; stat ./cloud/general/t/build-all-adcirc.sh; ./cloud/general/t/build-all-adcirc.sh"
        timeout-minutes: 120
