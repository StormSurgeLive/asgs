name: Run Selected Install Scripts

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  run-scripts:
    runs-on: ubuntu-22.04

    steps:
      - name: Test SSH access to ADCIRC repo
        run: |
          set -euxo pipefail
      
          echo "== SSH identity test =="
          ssh -T git@github.com || true
      
          echo "== Attempting clone =="
          rm -rf adcirc-test
          git clone git@github.com:adcirc/adcirc.git adcirc-test
      
          echo "== Clone successful =="
          ls -l adcirc-test

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Ubuntu packages
        run: |
          sudo apt-get -y update
          sudo apt-get install -y build-essential checkinstall
          sudo apt-get install -y libssl-dev libexpat1-dev
          sudo apt-get install -y gfortran wget curl vim screen htop tmux git bc
          sudo apt-get install -y zip flex gawk procps
          sudo apt-get install -y zlib1g-dev

      - name: Set TERM and run install script with --update-shell
        run: |
          export TERM=xterm
          ./init-asgs.sh -b -x "--update-shell"

      - name: Cache OpenMPI build directory
        id: cache-openmpi
        uses: actions/cache@v4
        with:
          path: ./tmp/openmpi-builddir
          key: ${{ runner.os }}-openmpi-builddir-${{ hashFiles('cloud/general/init-openmpi.sh', 'cloud/general/asgs-brew.pl') }}

      - name: Build or install OpenMPI
        run: |
          set -e
          export TERM=xterm

          if [ -f ./tmp/openmpi-builddir/Makefile ]; then
            echo "Using cached OpenMPI build directory"
            cd ./tmp/openmpi-builddir
            make install
          else
            echo "No cached OpenMPI build directory found; building OpenMPI"
            cd "$GITHUB_WORKSPACE"
            export ASGS_PRESERVE_OPENMPI_BUILD=1
            ./init-asgs.sh -b -x "--run-steps openmpi"
          fi
        timeout-minutes: 120

      - name: Cache HDF5 build directory
        id: cache-hdf5
        uses: actions/cache@v4
        with:
          path: ./tmp/hdf5-builddir
          key: ${{ runner.os }}-hdf5-builddir-${{ hashFiles('cloud/general/init-hdf5.sh') }}

      - name: Build or install HDF5
        run: |
          set -e
          export TERM=xterm

          if [ -f ./tmp/hdf5-builddir/Makefile ]; then
            echo "Using cached HDF5 build directory"
            cd ./tmp/hdf5-builddir
            make install
          else
            echo "No cached HDF5 build directory found; building HDF5"
            cd "$GITHUB_WORKSPACE"
            export ASGS_PRESERVE_HDF5_BUILD=1
            ./init-asgs.sh -b -x "--run-steps hdf5"
          fi
        timeout-minutes: 120

      - name: Cache netCDF4 build directory
        id: cache-netcdf4
        uses: actions/cache@v4
        with:
          path: ./tmp/netcdf4-builddir
          key: ${{ runner.os }}-netcdf4-builddir-${{ hashFiles('cloud/general/init-netCDF4.sh') }}

      - name: Build or install netCDF4
        run: |
          set -e
          export TERM=xterm

          if [ -f ./tmp/netcdf4-builddir/Makefile ]; then
            echo "Using cached netCDF4 build directory"
            cd ./tmp/netcdf4-builddir
            make install
          else
            echo "No cached netCDF4 build directory found; building netCDF4"
            cd "$GITHUB_WORKSPACE"
            export ASGS_PRESERVE_NETCDF4_BUILD=1
            ./init-asgs.sh -b -x "--run-steps netcdf4"
          fi
        timeout-minutes: 120

      - name: Run remaining ASGS build steps
        run: |
          set -e
          export TERM=xterm

          steps=(
            setup-env
            wgrib2
            cpra-postproc
            output
            util
            util-output
            input-mesh
            input-nodalattr
            perl
            perl-modules
            gnuplot
            units
            nco
            pigz
            jq
            asgs-lint
          )

          for step in "${steps[@]}"; do
            echo "=============================="
            echo "Running ASGS step: $step"
            echo "=============================="
            ./init-asgs.sh -b -x "--run-steps $step"
          done
        timeout-minutes: 120

      - name: Debug Build All Supported ADCIRCs
        run: |
          set -euxo pipefail
          export TERM=xterm
          env
          pwd
          ls -l ./asgsh
          ls -l ./cloud/general/t/build-all-adcirc.sh

          head -50 ./cloud/general/t/build-all-adcirc.sh || true

          ./asgsh -A "pwd; env; stat ./cloud/general/t/build-all-adcirc.sh; ./cloud/general/t/build-all-adcirc.sh"
        timeout-minutes: 120
